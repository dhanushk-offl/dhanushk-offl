name: Generate Metrics SVG

on:
  schedule:
    - cron: "0 1 * * *"   # runs daily at 1am UTC, after metrics update
  workflow_dispatch:

jobs:
  generate-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate commit calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: dhanushk-offl
          filename: metrics/calendar.svg

          # Use only the isocalendar plugin — clean 2D commit heatmap
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year   # options: half-year | full-year

          # Clean, minimal output
          config_display: large
          config_animations: no
          config_padding: 0
          config_output: svg
